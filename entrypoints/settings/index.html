<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>SF Boost — Settings</title>
</head>
<body>
  <div class="settings-page">
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 128 128">
            <rect width="128" height="128" rx="24" fill="#0176D3"/>
            <text x="64" y="82" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">SF</text>
            <circle cx="100" cy="28" r="16" fill="#2ECC71"/>
            <path d="M92 28 L98 34 L108 22" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="header-text">
          <h1>SF Boost Settings</h1>
          <span class="version" id="version-label"></span>
        </div>
      </div>
    </header>

    <main class="modules-settings" id="modules-settings"></main>

    <footer class="footer">
      <p class="footer-note">Changes are saved automatically and applied on the next page load.</p>
    </footer>
  </div>
  <script src="./main.ts" type="module"></script>
</body>
</html>
